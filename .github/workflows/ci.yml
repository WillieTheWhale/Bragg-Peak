name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,plot]"
      - name: Unit + physics tests
        run: pytest -q
      - name: Benchmark regression gate
        run: |
          # Regenerates the water-ladder benchmark and fails on regression vs
          # the committed baseline_metrics.json.
          python -m braggpeak.cli benchmark --model sde
