data:
  energies_mev: [70, 80, 90, 100, 110, 120, 130, 140, 150, 160, 170, 180, 190, 200, 210, 220, 230]
  heldout_energies_mev: [95, 135, 175, 205]
  dz_cm: 0.05
  max_depth_cm: 34.0
  n_geometries_per_energy: 64
  fidelity: sde
  seed: 0
  out_path: data/generated/phase1_1d.h5

train:
  model: braggtransporter_v0
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.00001
  epochs: 60
  device: auto
  distal_edge_weight: 5.0
  seed: 0
  out_dir: experiments/bt
  grad_clip: 1.0
  amp: false

model:
  d_model: 128
  n_layers: 4
  n_heads: 8
  d_ff: 256
  dropout: 0.0
  quantities: [dose, letd]
  extra:
    max_positions: 2048
